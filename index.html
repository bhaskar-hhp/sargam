<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sargam</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; min-height: 100vh; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            color: #fff;
            padding: 1rem 2rem;
        }
        .navbar a { color: #fff; text-decoration: none; cursor: pointer; }
        .logo { font-family: 'Pacifico', cursive; font-size: 1.5rem; }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }
        .nav-links a { color: #fff; text-decoration: none; cursor: pointer; }
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background: #fff;
            transition: 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -6px); }
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 0;
                left: -100%;
                width: 250px;
                height: 100vh;
                background: #333;
                flex-direction: column;
                padding: 4rem 2rem;
                transition: left 0.3s;
                z-index: 999;
            }
            .nav-links.open { left: 0; }
            .hamburger { display: flex; z-index: 1000; }
        }
        .section { display: none; }
        .section.active { display: block; }
        .hero { text-align: center; padding: 4rem 2rem; }
        .hero-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .hero-btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: #457b9d;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            animation: float 2s ease-in-out infinite;
        }
        .hero-btn:nth-child(2) { animation-delay: 0.3s; }
        .hero-btn:nth-child(3) { animation-delay: 0.6s; }
        .hero-btn:hover { background: #1d3557; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; margin-bottom: 1.5rem; }
        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            justify-content: center;
        }
        .controls input {
            flex: 1;
            min-width: 200px;
            padding: 0.6rem 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }
        .controls button {
            padding: 0.6rem 1.2rem;
            background: #457b9d;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .controls button:hover { background: #1d3557; }
        .controls label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .category {
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: #457b9d;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            user-select: none;
        }
        .category-header:hover { background: #1d3557; }
        .category-header .toggle {
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .category-header .toggle.open { transform: rotate(180deg); }
        .category-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #fff;
            color: #333;
            border-radius: 0 0 8px 8px;
        }
        .category-body.open { max-height: 5000px; }
        .category-body ul {
            list-style: none;
            padding: 0.5rem 1rem 1rem;
        }
        .category-body li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }
        .category-body li:last-child { border-bottom: none; }
        .qty {
            font-weight: 600;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .qty.in-stock { background: #d4edda; color: #155724; }
        .qty.out-of-stock { background: #f8d7da; color: #721c24; }
        .qty.low { background: #fff3cd; color: #856404; }
        #typing::after {
            content: '|';
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
        }
        @media (max-width: 600px) { .setup-grid { grid-template-columns: 1fr; } }
        .setup-card {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 1.5rem;
        }
        .setup-card h2 { margin-bottom: 1rem; font-size: 1.2rem; text-align: center; }
        .setup-form {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .setup-form h3 { margin-bottom: 0.5rem; font-size: 0.95rem; opacity: 0.8; }
        .setup-form input, .setup-form select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            border: 1px solid #555;
            border-radius: 5px;
            background: #fff;
            color: #333;
            font-size: 0.95rem;
        }
        .setup-form button {
            width: 100%;
            padding: 0.5rem;
            background: #457b9d;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .setup-form button:hover { background: #1d3557; }
        .btn-danger { background: #e63946 !important; }
        .btn-danger:hover { background: #c1121f !important; }
        #setupMsg {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.95rem;
        }
        #setupMsg.success { color: #2ecc71; }
        #setupMsg.error { color: #e63946; }
        .loading, .error, .no-results { text-align: center; padding: 2rem; }
        .error { color: #e63946; }
        .no-results { color: #888; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="logo" onclick="showSection('home')">Sargam</a>
        <ul class="nav-links" id="navLinks">
            <li><a onclick="showSection('home')">Home</a></li>
            <li><a onclick="showSection('stock')">Stock</a></li>
            <li><a onclick="showSection('partner')">Partner Balance</a></li>
            <li><a onclick="showSection('setup')">Setup</a></li>
            <li><a onclick="location.reload()">Refresh</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div id="section-home" class="section active">
        <div class="hero">
            <h1 id="typing"></h1>
            <div class="hero-buttons">
                <button class="hero-btn" onclick="showSection('stock')">Stock</button>
                <button class="hero-btn" onclick="showSection('partner')">Partner Balance</button>
                <button class="hero-btn" onclick="showSection('setup')">Setup</button>
            </div>
        </div>
    </div>

    <div id="section-stock" class="section">
        <div class="container">
            <h1>Stock</h1>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search product..." oninput="applyFilters()">
                <button onclick="applyFilters()">Search</button>
                <label>
                    <input type="checkbox" id="qtyFilter" onchange="applyFilters()">
                    In Stock only (qty &gt; 0)
                </label>
            </div>
            <div id="stockList" class="loading">Loading stock data...</div>
        </div>
    </div>

    <div id="section-partner" class="section">
        <div class="container">
            <h1>Partner Balance</h1>
            <p style="text-align:center;color:#888;">Coming soon...</p>
        </div>
    </div>

    <div id="section-setup" class="section">
        <div class="container">
            <h1>Setup</h1>
            <div class="setup-grid">
                <div class="setup-card">
                    <h2>Manage Categories</h2>
                    <div class="setup-form">
                        <h3>Add Category</h3>
                        <input type="text" id="newCategory" placeholder="Category name">
                        <button onclick="addCategory()">Add</button>
                    </div>
                    <div class="setup-form">
                        <h3>Remove Category</h3>
                        <select id="removeCategory"></select>
                        <button class="btn-danger" onclick="removeCategory()">Remove</button>
                    </div>
                </div>
                <div class="setup-card">
                    <h2>Manage Items</h2>
                    <div class="setup-form">
                        <h3>Add Item</h3>
                        <select id="addItemCategory"></select>
                        <input type="text" id="newItem" placeholder="Model name">
                        <button onclick="addItem()">Add</button>
                    </div>
                    <div class="setup-form">
                        <h3>Remove Item</h3>
                        <select id="removeItemCategory" onchange="updateRemoveItemSelect()"></select>
                        <select id="removeItem"></select>
                        <button class="btn-danger" onclick="removeItem()">Remove</button>
                    </div>
                </div>
            </div>
            <div id="setupMsg"></div>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('open');
        });

        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            navLinks.classList.remove('open');
            hamburger.classList.remove('active');
        }

        const SHEET1 = 'https://docs.google.com/spreadsheets/d/1LZtsBP5irE0_t8vowQFG9bxjiQgoZ1R3hVL3gWAo1zQ/export?format=csv&gid=334012384';
        const SHEET2 = 'https://docs.google.com/spreadsheets/d/1LZtsBP5irE0_t8vowQFG9bxjiQgoZ1R3hVL3gWAo1zQ/export?format=csv&gid=1431482232';

        let allItems = [];

        function parseCSV(csv) {
            const lines = csv.split('\n').filter(l => l.trim());
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const fields = [];
                let cur = '', inQ = false;
                for (let j = 0; j < line.length; j++) {
                    const ch = line[j];
                    if (inQ) {
                        if (ch === '"' && j + 1 < line.length && line[j + 1] === '"') { cur += '"'; j++; }
                        else if (ch === '"') inQ = false;
                        else cur += ch;
                    } else {
                        if (ch === '"') inQ = true;
                        else if (ch === ',') { fields.push(cur); cur = ''; }
                        else cur += ch;
                    }
                }
                fields.push(cur);
                if (fields.length >= 2) rows.push({ a: fields[0], b: fields[1] });
            }
            return rows;
        }

        async function loadStock() {
            const container = document.getElementById('stockList');
            try {
                const [res1, res2] = await Promise.all([fetch(SHEET1), fetch(SHEET2)]);
                if (!res1.ok || !res2.ok) throw new Error('Failed to fetch data');
                const csv1 = await res1.text();
                const csv2 = await res2.text();

                const products = parseCSV(csv1);
                const qtyData = parseCSV(csv2);

                const qtyMap = {};
                qtyData.forEach(r => {
                    const name = r.a.trim().toLowerCase();
                    const qty = parseInt(r.b) || 0;
                    if (!qtyMap[name] || qtyMap[name] === 0) qtyMap[name] = qty;
                });

                allItems = products.map(p => {
                    const model = p.b.trim();
                    const qty = qtyMap[model.toLowerCase()] !== undefined ? qtyMap[model.toLowerCase()] : 0;
                    return { category: p.a.trim(), model, qty };
                });

                applyFilters();
            } catch (err) {
                container.innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        }

        function getQtyClass(qty) {
            if (qty > 10) return 'in-stock';
            if (qty > 0) return 'low';
            return 'out-of-stock';
        }

        function applyFilters() {
            const container = document.getElementById('stockList');
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const onlyInStock = document.getElementById('qtyFilter').checked;

            let filtered = allItems;
            if (query) filtered = filtered.filter(i => i.model.toLowerCase().includes(query));
            if (onlyInStock) filtered = filtered.filter(i => i.qty > 0);

            const grouped = {};
            filtered.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            const keys = Object.keys(grouped);
            if (keys.length === 0) {
                container.innerHTML = '<div class="no-results">No matching products found.</div>';
                return;
            }

            container.innerHTML = '';
            keys.forEach(category => {
                const catDiv = document.createElement('div');
                catDiv.className = 'category';
                const items = grouped[category];
                catDiv.innerHTML = `
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span>${category} (${items.length})</span>
                        <span class="toggle">&#9660;</span>
                    </div>
                    <div class="category-body">
                        <ul>${items.map(i => {
                            const cls = getQtyClass(i.qty);
                            const label = i.qty > 0 ? i.qty : '0';
                            return `<li><span>${i.model}</span><span class="qty ${cls}">${label}</span></li>`;
                        }).join('')}</ul>
                    </div>
                `;
                container.appendChild(catDiv);
            });
        }

        function toggleCategory(header) {
            const body = header.nextElementSibling;
            const toggle = header.querySelector('.toggle');
            body.classList.toggle('open');
            toggle.classList.toggle('open');
        }

        loadStock();

        const text = "Here We Go";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById('typing').textContent += text.charAt(i);
                i++;
                setTimeout(typeWriter, 80);
            }
        }
        typeWriter();

        // ─── Setup Tab ──────────────────────────────────────────────
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqWmhjLFtc1g8tJiFoNju8_o7NIBupPEE6e69pqysFRPupGnXCt-RCR_ELypUBPuui/exec';

        function getUniqueCategories() {
            const cats = {};
            allItems.forEach(i => cats[i.category] = true);
            return Object.keys(cats).sort();
        }

        function populateSetupSelects() {
            const cats = getUniqueCategories();
            ['removeCategory', 'addItemCategory', 'removeItemCategory'].forEach(id => {
                const sel = document.getElementById(id);
                if (!sel) return;
                sel.innerHTML = cats.map(c => `<option value="${c.replace(/"/g, '&quot;')}">${c}</option>`).join('');
            });
        }

        function updateRemoveItemSelect() {
            const cat = document.getElementById('removeItemCategory').value;
            const sel = document.getElementById('removeItem');
            const items = allItems.filter(i => i.category === cat);
            sel.innerHTML = items.map(i => `<option value="${i.model.replace(/"/g, '&quot;')}">${i.model}</option>`).join('');
        }
        document.addEventListener('DOMContentLoaded', () => {
            const rmCat = document.getElementById('removeItemCategory');
            if (rmCat) rmCat.addEventListener('change', updateRemoveItemSelect);
        });

        function setupMsg(text, type) {
            const el = document.getElementById('setupMsg');
            el.textContent = text;
            el.className = type;
            setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
        }

        async function callAppsScript(action, payload) {
            if (!APPS_SCRIPT_URL) {
                setupMsg('Please set APPS_SCRIPT_URL in the code first. See AppsScript.gs for setup.', 'error');
                return null;
            }
            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...payload })
                });
                return true;
            } catch (err) {
                setupMsg('Error: ' + err.message, 'error');
                return null;
            }
        }

        async function addCategory() {
            const cat = document.getElementById('newCategory').value.trim();
            if (!cat) { setupMsg('Enter a category name', 'error'); return; }
            const ok = await callAppsScript('addCategory', { category: cat });
            if (ok) { setupMsg(`Category "${cat}" added! Refresh stock to see changes.`, 'success'); }
        }

        async function removeCategory() {
            const cat = document.getElementById('removeCategory').value;
            if (!confirm(`Remove entire category "${cat}" and all its items?`)) return;
            const ok = await callAppsScript('removeCategory', { category: cat });
            if (ok) { setupMsg(`Category "${cat}" removed! Refresh stock to see changes.`, 'success'); }
        }

        async function addItem() {
            const cat = document.getElementById('addItemCategory').value;
            const item = document.getElementById('newItem').value.trim();
            if (!item) { setupMsg('Enter a model name', 'error'); return; }
            const ok = await callAppsScript('addItem', { category: cat, item });
            if (ok) { setupMsg(`Item added to "${cat}"! Refresh stock to see changes.`, 'success'); }
        }

        async function removeItem() {
            const cat = document.getElementById('removeItemCategory').value;
            const item = document.getElementById('removeItem').value;
            if (!confirm(`Remove "${item}" from "${cat}"?`)) return;
            const ok = await callAppsScript('removeItem', { category: cat, item });
            if (ok) { setupMsg(`Item removed! Refresh stock to see changes.`, 'success'); }
        }

        // Reload categories after stock data loads
        const origApply = applyFilters;
        applyFilters = function() {
            origApply();
            populateSetupSelects();
            updateRemoveItemSelect();
        };
    </script>
</body>
</html>
