<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            color: #fff;
            padding: 1rem 2rem;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }
        .nav-links a { color: #fff; text-decoration: none; }
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background: #fff;
            transition: 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -6px); }
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 0;
                left: -100%;
                width: 250px;
                height: 100vh;
                background: #333;
                flex-direction: column;
                padding: 4rem 2rem;
                transition: left 0.3s;
                z-index: 999;
            }
            .nav-links.open { left: 0; }
            .hamburger { display: flex; z-index: 1000; }
        }
        .hero { text-align: center; padding: 4rem 2rem; }
        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .hero-btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: #457b9d;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            animation: float 2s ease-in-out infinite;
        }
        .hero-btn:nth-child(2) { animation-delay: 0.3s; }
        .hero-btn:nth-child(3) { animation-delay: 0.6s; }
        .hero-btn:hover { background: #1d3557; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Sargam</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#">Home</a></li>
            <li><a href="stock.html">Stock</a></li>
            <li><a href="#">Partner Balance</a></li>
            <li><a href="#">Setup</a></li>
            <li><a href="#">Refresh</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    <div class="hero">
        <h1>Welcome</h1>
        <div class="hero-buttons">
            <button class="hero-btn" onclick="location.href='stock.html'">Stock</button>
            <button class="hero-btn" onclick="alert('Partner Balance')">Partner Balance</button>
            <button class="hero-btn" onclick="alert('Setup')">Setup</button>
        </div>
    </div>
    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('open');
        });
    </script>
</body>
</html>
